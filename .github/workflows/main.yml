name: Build Fully Static SSHFS (Alpine - Working)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest

    steps:
      - name: Install build dependencies
        run: |
          apk update
          apk add --no-cache \
            alpine-sdk \
            fuse3-dev \
            fuse3-static \
            glib-dev \
            glib-static \
            meson \
            ninja \
            git \
            pkgconfig \
            musl-dev \
            linux-headers

      - name: Clone SSHFS
        run: |
          git clone https://github.com/libfuse/sshfs.git
          cd sshfs
          git checkout sshfs-3.7.5

      - name: Build static SSHFS
        run: |
          cd sshfs
          mkdir build && cd build
          
          export LDFLAGS="-static -pthread"
          export CFLAGS="-Os -static"
          
          meson setup \
            --prefix=/usr \
            --buildtype=release \
            --default-library=static \
            -Dfuse3:static=true \
            -Dglib:static=true \
            ..
          
          # Заменяем все динамические библиотеки на статические
          sed -i 's|/usr/lib/libfuse3.so|/usr/lib/libfuse3.a|g' build.ninja
          sed -i 's|/usr/lib/libglib-2.0.so|/usr/lib/libglib-2.0.a|g' build.ninja
          sed -i 's|/usr/lib/libgthread-2.0.so|/usr/lib/libgthread-2.0.a|g' build.ninja
          sed -i 's|/usr/lib/libintl.so|/usr/lib/libintl.a|g' build.ninja
          sed -i 's|/usr/lib/libpcre2-8.so|/usr/lib/libpcre2-8.a|g' build.ninja
          
          ninja

      - name: Verify binary
        run: |
          cd sshfs/build
          if [ -f sshfs ]; then
            echo "=== Сборка успешна! ==="
            ls -lh sshfs
            file sshfs
            ldd sshfs 2>&1 || echo "✓ Статический бинарник готов!"
          else
            echo "Бинарник не создан"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sshfs-static-3.7.5
          path: sshfs/build/sshfs
          retention-days: 90
