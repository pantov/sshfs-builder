name: Build Fully Static SSHFS (Alpine - Final)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest

    steps:
      - name: Install build dependencies
        run: |
          apk update
          apk add --no-cache \
            alpine-sdk \
            fuse3-dev \
            fuse3-static \
            glib-dev \
            glib-static \
            meson \
            ninja \
            git \
            pkgconfig \
            musl-dev \
            linux-headers \
            libc-dev

      - name: Clone SSHFS
        run: |
          git clone https://github.com/libfuse/sshfs.git
          cd sshfs
          git checkout sshfs-3.7.5

      - name: Build static SSHFS
        run: |
          cd sshfs
          mkdir build && cd build
          
          # Отключаем атомики и используем встроенные функции
          export LDFLAGS="-static -pthread -Wl,-Bstatic"
          export CFLAGS="-Os -static -D_GNU_SOURCE"
          
          meson setup \
            --prefix=/usr \
            --buildtype=release \
            --default-library=static \
            -Dfuse3:static=true \
            -Dglib:static=true \
            -Datomic=true \
            ..
          
          # Исправляем ссылки на библиотеки
          sed -i 's|/usr/lib/libatomic.so||g' build.ninja
          sed -i 's|/usr/lib/libfuse3.so|/usr/lib/libfuse3.a|g' build.ninja
          sed -i 's|/usr/lib/libglib-2.0.so|/usr/lib/libglib-2.0.a|g' build.ninja
          sed -i 's|/usr/lib/libgthread-2.0.so|/usr/lib/libgthread-2.0.a|g' build.ninja
          sed -i 's|/usr/lib/libintl.so|/usr/lib/libintl.a|g' build.ninja
          sed -i 's|/usr/lib/libpcre2-8.so|/usr/lib/libpcre2-8.a|g' build.ninja
          
          ninja -v

      - name: Verify binary
        run: |
          cd sshfs/build
          if [ -f sshfs ]; then
            echo "=== Сборка успешна! ==="
            ls -lh sshfs
            file sshfs
            ldd sshfs 2>&1 || echo "✓ Статический бинарник готов!"
          else
            echo "Бинарник не создан"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sshfs-static-3.7.5
          path: sshfs/build/sshfs
          retention-days: 90
