name: Build Fully Static SSHFS (Alpine)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest

    steps:
      - name: Install build dependencies
        run: |
          apk update
          apk add --no-cache \
            alpine-sdk \
            fuse3-dev \
            fuse3-static \
            glib-dev \
            glib-static \
            meson \
            ninja \
            git \
            pkgconfig \
            musl-dev \
            linux-headers

      - name: Clone and build SSHFS
        run: |
          git clone https://github.com/libfuse/sshfs.git
          cd sshfs
          git checkout sshfs-3.7.5
          mkdir build && cd build

          export LDFLAGS="-static"
          export CFLAGS="-Os -static"

          meson setup \
            --prefix=/usr \
            --buildtype=release \
            --default-library=static \
            ..

          ninja

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sshfs-static-3.7.5
          path: sshfs/build/sshfs
          retention-days: 90
