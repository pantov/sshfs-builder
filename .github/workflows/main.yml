name: Build static sshfs

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build static sshfs
        run: |
          sudo apt update
          sudo apt install -y git meson ninja-build pkg-config libfuse3-dev libglib2.0-dev gcc make
          git clone https://github.com/libfuse/sshfs.git
          cd sshfs
          git checkout sshfs-3.7.5
          mkdir build && cd build
          export LDFLAGS="-static -pthread"
          meson setup --prefix=/usr --buildtype=release --default-library=static ..
          ninja
          cp sshfs /tmp/sshfs
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sshfs-static
          path: /tmp/sshfs
