name: Build Fully Static SSHFS (Alpine - Final)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest

    steps:
      - name: Install build dependencies
        run: |
          apk update
          apk add --no-cache \
            alpine-sdk \
            fuse3-dev \
            fuse3-static \
            glib-dev \
            glib-static \
            meson \
            ninja \
            git \
            pkgconfig \
            musl-dev \
            linux-headers \
            libatomic-static

      - name: Clone SSHFS
        run: |
          git clone https://github.com/libfuse/sshfs.git
          cd sshfs
          git checkout sshfs-3.7.5

      - name: Build static SSHFS
        run: |
          cd sshfs
          mkdir build && cd build
          
          # Принудительно заменяем все динамические библиотеки на статические
          export LDFLAGS="-static -Wl,-Bstatic"
          export CFLAGS="-Os -static"
          
          meson setup \
            --prefix=/usr \
            --buildtype=release \
            --default-library=static \
            -Dfuse3:static=true \
            -Dglib:static=true \
            -Dc_args="-static" \
            -Dc_link_args="-static -Wl,-Bstatic" \
            ..
          
          # Заменяем все .so на .a в файле сборки
          sed -i 's|/usr/lib/libfuse3.so|/usr/lib/libfuse3.a|g' build.ninja
          sed -i 's|/usr/lib/libglib-2.0.so|/usr/lib/libglib-2.0.a|g' build.ninja
          sed -i 's|/usr/lib/libgthread-2.0.so|/usr/lib/libgthread-2.0.a|g' build.ninja
          sed -i 's|/usr/lib/libintl.so|/usr/lib/libintl.a|g' build.ninja
          sed -i 's|/usr/lib/libatomic.so|/usr/lib/libatomic.a|g' build.ninja
          sed -i 's|/usr/lib/libpcre2-8.so|/usr/lib/libpcre2-8.a|g' build.ninja
          
          ninja

      - name: Verify binary
        run: |
          cd sshfs/build
          echo "=== Размер ==="
          ls -lh sshfs
          echo ""
          echo "=== Тип файла ==="
          file sshfs
          echo ""
          echo "=== Зависимости ==="
          ldd sshfs 2>&1 || echo "✓ Статическая сборка успешна!"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sshfs-static-3.7.5
          path: sshfs/build/sshfs
          retention-days: 90
